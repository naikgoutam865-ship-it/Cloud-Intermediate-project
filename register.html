<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register | Roman Cloud Batch</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>
<style>
    /* ===========================
    Roman Cloud Batch
    Register Page
    =========================== */

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Poppins',sans-serif;
    }

    body{
        background:#f4f7fb;
    }

    /* ===========================
    Main Container
    =========================== */

    .register-container{
        display:flex;
        min-height:100vh;
    }

    /* ===========================
    Left Panel
    =========================== */

    .left-panel{
        width:40%;
        background:#2563eb;
        color:white;
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
        text-align:center;
        padding:40px;
    }

    .left-panel h1{
        font-size:36px;
        margin-bottom:20px;
    }

    .left-panel p{
        margin-bottom:15px;
        line-height:1.6;
    }

    .left-panel img{
        width:280px;
        margin-top:25px;
    }

    /* ===========================
    Right Panel
    =========================== */

    .right-panel{
        width:60%;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:30px;
    }

    /* ===========================
    Register Card
    =========================== */

    .register-card{
        width:100%;
        max-width:450px;
        background:white;
        padding:35px;
        border-radius:10px;
        box-shadow:0 5px 20px rgba(0,0,0,.1);
    }

    .register-card h2{
        text-align:center;
        margin-bottom:10px;
    }

    .register-card p{
        text-align:center;
        color:gray;
        margin-bottom:25px;
    }

    /* ===========================
    Input Fields
    =========================== */

    .input-box{
        margin-bottom:18px;
    }

    .input-box label{
        display:block;
        margin-bottom:6px;
        font-weight:500;
    }

    .input-field{
        display:flex;
        align-items:center;
        border:1px solid #ccc;
        border-radius:6px;
        overflow:hidden;
    }

    .input-field i{
        width:45px;
        text-align:center;
        color:#666;
    }

    .input-field input{
        width:100%;
        border:none;
        outline:none;
        padding:12px;
        font-size:15px;
    }

    #togglePassword,
    #toggleConfirmPassword{
        cursor:pointer;
    }

    /* ===========================
    Terms
    =========================== */

    .terms{
        margin:15px 0;
        font-size:14px;
    }

    .terms input{
        margin-right:6px;
    }

    /* ===========================
    Register Button
    =========================== */

    .register-btn{
        width:100%;
        background:#2563eb;
        color:white;
        border:none;
        padding:14px;
        border-radius:6px;
        cursor:pointer;
        font-size:16px;
        transition:.3s;
    }

    .register-btn:hover{
        background:#1d4ed8;
    }

    /* ===========================
    Divider
    =========================== */

    .divider{
        text-align:center;
        margin:20px 0;
        color:#888;
    }

    /* ===========================
    Social Buttons
    =========================== */

    .social-register{
        display:flex;
        gap:10px;
    }

    .social-register button{
        flex:1;
        padding:12px;
        border:1px solid #ccc;
        background:white;
        cursor:pointer;
        border-radius:6px;
        transition:.3s;
    }

    .social-register button:hover{
        background:#f1f5f9;
    }

    /* ===========================
    Links
    =========================== */

    .login-link,
    .back-home{
        text-align:center;
        margin-top:18px;
    }

    .login-link a,
    .back-home a{
        text-decoration:none;
        color:#2563eb;
    }

    .login-link a:hover,
    .back-home a:hover{
        text-decoration:underline;
    }

    /* ===========================
    Responsive
    =========================== */

    @media(max-width:768px){

    .register-container{
        flex-direction:column;
    }

    .left-panel{
        width:100%;
        padding:30px;
    }

    .right-panel{
        width:100%;
    }

    .left-panel img{
        width:200px;
    }

    .register-card{
        max-width:100%;
    }

    .social-register{
        flex-direction:column;
    }

    }
</style>
<body>

<div class="register-container">

    <!-- ================= LEFT PANEL ================= -->

    <div class="left-panel">

        <h1>Roman Cloud Batch</h1>

        <p>Create your account and start learning</p>

        <p>
            Join our Cloud Engineering Batch and begin your journey in
            AWS, Docker, Jenkins, Linux, Networking and CI/CD.
        </p>

        <img src="images/register-image.png" alt="Register Image">

    </div>

    <!-- ================= RIGHT PANEL ================= -->

    <div class="right-panel">

        <div class="register-card">

            <h2>Create Account</h2>

            <p>Fill in the details below</p>

            <form id="registerForm">

                <!-- Full Name -->

                <div class="input-box">

                    <label>Full Name</label>

                    <div class="input-field">

                        <i class="fa-solid fa-user"></i>

                        <input
                            type="text"
                            id="fullname"
                            placeholder="Enter Full Name"
                            required>

                    </div>

                </div>

                <!-- Email -->

                <div class="input-box">

                    <label>Email Address</label>

                    <div class="input-field">

                        <i class="fa-solid fa-envelope"></i>

                        <input
                            type="email"
                            id="email"
                            placeholder="Enter Email"
                            required>

                    </div>

                </div>

                <!-- Username -->

                <div class="input-box">

                    <label>Username</label>

                    <div class="input-field">

                        <i class="fa-solid fa-user-tag"></i>

                        <input
                            type="text"
                            id="username"
                            placeholder="Choose Username"
                            required>

                    </div>

                </div>

                <!-- Password -->

                <div class="input-box">

                    <label>Password</label>

                    <div class="input-field">

                        <i class="fa-solid fa-lock"></i>

                        <input
                            type="password"
                            id="password"
                            placeholder="Create Password"
                            required>

                        <i
                            class="fa-solid fa-eye"
                            id="togglePassword">

                        </i>

                    </div>

                </div>

                <!-- Confirm Password -->

                <div class="input-box">

                    <label>Confirm Password</label>

                    <div class="input-field">

                        <i class="fa-solid fa-lock"></i>

                        <input
                            type="password"
                            id="confirmPassword"
                            placeholder="Confirm Password"
                            required>

                        <i
                            class="fa-solid fa-eye"
                            id="toggleConfirmPassword">

                        </i>

                    </div>

                </div>

                <!-- Terms -->

                <div class="terms">

                    <label>

                        <input
                            type="checkbox"
                            id="terms">

                        I agree to the Terms & Conditions

                    </label>

                </div>

                <!-- Register Button -->

                <button
                    type="submit"
                    class="register-btn">

                    Create Account

                </button>

            </form>

            <!-- Divider -->

            <div class="divider">

                <span>OR</span>

            </div>

            <!-- Social Buttons -->

            <div class="social-register">

                <button>

                    <i class="fa-brands fa-google"></i>

                    Google

                </button>

                <button>

                    <i class="fa-brands fa-github"></i>

                    GitHub

                </button>

            </div>

            <!-- Login Link -->

            <div class="login-link">

                Already have an account?

                <a href="login.html">

                    Login

                </a>

            </div>

            <!-- Home Link -->

            <div class="back-home">

                <a href="index.html">

                    ← Back to Home

                </a>

            </div>

        </div>

    </div>

</div>

<script>
    /* ===================================
    Roman Cloud Batch
    Register Page JavaScript
    =================================== */

    // Select Elements

    const registerForm = document.getElementById("registerForm");

    const fullname = document.getElementById("fullname");
    const email = document.getElementById("email");
    const username = document.getElementById("username");
    const password = document.getElementById("password");
    const confirmPassword = document.getElementById("confirmPassword");
    const terms = document.getElementById("terms");

    const togglePassword = document.getElementById("togglePassword");
    const toggleConfirmPassword = document.getElementById("toggleConfirmPassword");

    // ================================
    // Show / Hide Password
    // ================================

    togglePassword.addEventListener("click", () => {

        if(password.type === "password"){

            password.type = "text";
            togglePassword.classList.replace("fa-eye","fa-eye-slash");

        }else{

            password.type = "password";
            togglePassword.classList.replace("fa-eye-slash","fa-eye");

        }

    });

    // ================================
    // Show / Hide Confirm Password
    // ================================

    toggleConfirmPassword.addEventListener("click", () => {

        if(confirmPassword.type === "password"){

            confirmPassword.type = "text";
            toggleConfirmPassword.classList.replace("fa-eye","fa-eye-slash");

        }else{

            confirmPassword.type = "password";
            toggleConfirmPassword.classList.replace("fa-eye-slash","fa-eye");

        }

    });

    // ================================
    // Register Validation
    // ================================

    registerForm.addEventListener("submit", function(e){

        e.preventDefault();

        if(fullname.value.trim() === ""){

            alert("Please enter your full name.");
            fullname.focus();
            return;

        }

        if(email.value.trim() === ""){

            alert("Please enter your email.");
            email.focus();
            return;

        }

        if(username.value.trim().length < 3){

            alert("Username must be at least 3 characters.");
            username.focus();
            return;

        }

        if(password.value.length < 6){

            alert("Password must be at least 6 characters.");
            password.focus();
            return;

        }

        if(password.value !== confirmPassword.value){

            alert("Passwords do not match.");
            confirmPassword.focus();
            return;

        }

        if(!terms.checked){

            alert("Please accept the Terms & Conditions.");
            return;

        }

        // =====================================
        // Save User in LocalStorage
        // =====================================

        let users = JSON.parse(localStorage.getItem("users")) || [];

        // Check Duplicate Username

        let userExists = users.find(function(user){

            return user.username === username.value.trim();

        });

        if(userExists){

            alert("Username already exists.");

            username.focus();

            return;

        }

        // Create User Object

        const newUser = {

            fullname: fullname.value.trim(),

            email: email.value.trim(),

            username: username.value.trim(),

            password: password.value

        };

        // Save User

        users.push(newUser);

        localStorage.setItem("users", JSON.stringify(users));

        alert("Registration Successful!");

        registerForm.reset();

        window.location.href = "login.html";

    });

    // ================================
    // Console Message
    // ================================

    console.log("Roman Cloud Batch - Register Page Loaded Successfully");

</script>

</body>

</html>
